<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark background -->
  <rect width="100" height="100" fill="#0C1220" rx="22"/>

  <!-- Radiant mark, centered at (50, 50) -->
  <g transform="translate(50, 50)">
    <!-- Cardinal rays (long) -->
    <line x1="0" y1="-11" x2="0" y2="-33" stroke="#FFBB33" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="11" x2="0" y2="33" stroke="#FFBB33" stroke-width="3" stroke-linecap="round"/>
    <line x1="11" y1="0" x2="33" y2="0" stroke="#FFBB33" stroke-width="3" stroke-linecap="round"/>
    <line x1="-11" y1="0" x2="-33" y2="0" stroke="#FFBB33" stroke-width="3" stroke-linecap="round"/>
    <!-- Diagonal rays (short) -->
    <line x1="7.78" y1="-7.78" x2="16.97" y2="-16.97" stroke="#FFBB33" stroke-width="2.4" stroke-linecap="round" opacity="0.55"/>
    <line x1="7.78" y1="7.78" x2="16.97" y2="16.97" stroke="#FFBB33" stroke-width="2.4" stroke-linecap="round" opacity="0.55"/>
    <line x1="-7.78" y1="7.78" x2="-16.97" y2="16.97" stroke="#FFBB33" stroke-width="2.4" stroke-linecap="round" opacity="0.55"/>
    <line x1="-7.78" y1="-7.78" x2="-16.97" y2="-16.97" stroke="#FFBB33" stroke-width="2.4" stroke-linecap="round" opacity="0.55"/>
    <!-- Center node -->
    <circle cx="0" cy="0" r="6" fill="#FFBB33"/>
  </g>
</svg>
